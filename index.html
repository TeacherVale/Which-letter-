<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Game: C, G, I, N</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            background: radial-gradient(circle, #ff9a9e 0%, #fad0c4 100%);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0;
        }
        h1 { color: #2e86de; text-shadow: 2px 2px white; margin-top: 20px; font-size: 35px; }
        
        #gameGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px; max-width: 700px; }
        .box-container { width: 140px; height: 140px; perspective: 1000px; cursor: pointer; }
        .box {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transition: transform 0.5s; background: #feca57; border: 5px solid white; border-radius: 20px;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 0 #ee5253;
        }
        .box.opened { transform: rotateY(180deg); background: #e0f7fa; }
        .box.solved { background-color: #a5d6a7; border-color: #2ecc71; box-shadow: 0 6px 0 #43a047; }
        
        .content { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .back { transform: rotateY(180deg); }
        .img-card { width: 70%; height: 70%; object-fit: contain; }
        
        /* ETIQUETA QUE APARECE DESPUÉS */
        .name-label { 
            display: none; font-size: 20px; color: #2e86de; font-weight: bold; 
            margin-top: 5px; background: white; padding: 2px 10px; border-radius: 10px; 
        }

        /* PANEL DE OPCIONES ALINEADAS */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; }
        .pane { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 30px; border-radius: 35px; border: 8px solid #54a0ff; z-index: 101; text-align: center;
        }
        
        .btn-row { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .btn { 
            font-size: 40px; width: 85px; height: 85px; border-radius: 50%; color: white; cursor: pointer;
            border: 6px solid white !important; /* BORDE BLANCO */
            font-weight: bold; box-shadow: 0 5px 0 rgba(0,0,0,0.2); transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-C { background: #FF5252; } .btn-G { background: #4CAF50; } 
        .btn-I { background: #2196F3; } .btn-N { background: #FFEB3B; color: #333; }

        #oops { display: none; position: fixed; top: 45%; background: white; padding: 25px; border-radius: 25px; border: 6px solid #ff4757; color: #ff4757; z-index: 200; font-size: 35px; font-weight: bold; box-shadow: 0 0 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <h1>WHICH LETTER?</h1>
    <div id="gameGrid"></div>

    <div class="overlay" id="overlay"></div>
    <div class="pane" id="pane">
        <div id="img-target" style="font-size: 100px;"></div>
        <div class="btn-row">
            <button class="btn btn-C" onclick="check('C')">C</button>
            <button class="btn btn-G" onclick="check('G')">G</button>
            <button class="btn btn-I" onclick="check('I')">I</button>
            <button class="btn btn-N" onclick="check('N')">N</button>
        </div>
    </div>

    <div id="oops">OOPS! ❌ Try again!</div>

    <script>
        const gameData = [
            { name: 'CAT', letter: 'C', type: 'emoji', value: '🐱' },
            { name: 'CAR', letter: 'C', type: 'emoji', value: '🚗' },
            { name: 'CAKE', letter: 'C', type: 'emoji', value: '🎂' },
            { name: 'GRANDMA', letter: 'G', type: 'emoji', value: '👵' },
            { name: 'GUITAR', letter: 'G', type: 'emoji', value: '🎸' },
            { name: 'GRAPES', letter: 'G', type: 'emoji', value: '🍇' },
            { name: 'INSECT', letter: 'I', type: 'emoji', value: '🪲' },
            { name: 'IGUANA', letter: 'I', type: 'img', value: 'iguana.png' },
            { name: 'IGLOO', letter: 'I', type: 'img', value: 'igloo.png' },
            { name: 'NINE', letter: 'N', type: 'emoji', value: '9️⃣' },
            { name: 'NOSE', letter: 'N', type: 'emoji', value: '👃' },
            { name: 'NURSE', letter: 'N', type: 'img', value: 'nurse.png' }
        ];

        let active = null, activeIdx = null;

        function init() {
            const grid = document.getElementById('gameGrid');
            [...gameData].sort(() => Math.random() - 0.5).forEach((d, i) => {
                const box = document.createElement('div');
                box.className = 'box-container';
                box.innerHTML = `<div class="box" id="box-${i}" onclick="openBox(${i})">
                    <div class="content front" style="font-size:50px; color:white;">${i+1}</div>
                    <div class="content back" id="back-${i}">
                        ${d.type === 'img' ? `<img src="${d.value}" class="img-card">` : `<span>${d.value}</span>`}
                        <div class="name-label" id="label-${i}">${d.name}</div>
                    </div>
                </div>`;
                grid.appendChild(box);
            });
        }

        function openBox(i) {
            if (active) return;
            activeIdx = i;
            const backDiv = document.getElementById(`back-${i}`);
            // Identificar qué objeto es comparando el contenido
            active = gameData.find(d => backDiv.innerHTML.includes(d.value));
            
            document.getElementById(`box-${i}`).classList.add('opened');
            setTimeout(() => {
                // Solo pasamos el emoji o imagen al panel, sin el label todavía
                const iconOnly = active.type === 'img' ? `<img src="${active.value}" style="width:150px;">` : active.value;
                document.getElementById('img-target').innerHTML = iconOnly;
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('pane').style.display = 'block';
            }, 600);
        }

        function check(l) {
            document.getElementById('pane').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            if (l === active.letter) {
                confetti();
                document.getElementById(`box-${activeIdx}`).classList.add('solved');
                // AQUÍ APARECE LA PALABRA DESPUÉS DE LA RESPUESTA
                document.getElementById(`label-${activeIdx}`).style.display = 'block';
                
                if ('speechSynthesis' in window) {
                    const msg = new SpeechSynthesisUtterance(`${active.letter} is for ${active.name}`);
                    msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
                }
                active = null;
            } else {
                document.getElementById('oops').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('oops').style.display = 'none';
                    document.getElementById(`box-${activeIdx}`).classList.remove('opened');
                    active = null;
                }, 1200);
            }
        }
        init();
    </script>
</body>
</html>
