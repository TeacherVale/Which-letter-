<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Game</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            background: #fad0c4;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0;
        }
        #gameGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .box-container { width: 120px; height: 120px; perspective: 1000px; cursor: pointer; }
        .box {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transition: transform 0.5s; background: #feca57; border: 4px solid white; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
        }
        .box.opened { transform: rotateY(180deg); background: #e0f7fa; }
        .box.solved { background-color: #a5d6a7; border-color: #2ecc71; }
        .content { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; }
        .back { transform: rotateY(180deg); flex-direction: column; }
        .img-card { width: 75%; height: 75%; object-fit: contain; }
        
        /* TEXTO DEL NOMBRE (IGUANA, CAT, ETC) */
        .name-label { font-size: 18px; color: #2e86de; font-weight: bold; margin-top: 5px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; }
        .pane { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px; border-radius: 30px; border: 8px solid #54a0ff; z-index: 101; text-align: center; width: 320px;
        }
        
        /* BOTONES 2x2 CON BORDE BLANCO */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .btn { 
            font-size: 45px; width: 95px; height: 95px; border-radius: 50%; color: white; cursor: pointer;
            border: 6px solid white !important; 
            box-shadow: 0 6px 0 rgba(0,0,0,0.1); font-weight: bold;
        }
        .btn-C { background: #FF5252; } .btn-G { background: #4CAF50; } 
        .btn-I { background: #2196F3; } .btn-N { background: #FFEB3B; color: #333; }

        #oops { display: none; position: fixed; top: 40%; background: white; padding: 20px; border-radius: 20px; border: 5px solid red; z-index: 200; font-size: 30px; text-align: center; }
        #win { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
    </style>
</head>
<body>

    <h1 style="color: #2e86de; text-shadow: 2px 2px white;">WHICH LETTER?</h1>
    <div id="gameGrid"></div>

    <div class="overlay" id="overlay"></div>
    <div class="pane" id="pane">
        <div id="img-target" style="display: flex; flex-direction: column; align-items: center;"></div>
        <div class="btn-grid">
            <button class="btn btn-C" onclick="check('C')">C</button>
            <button class="btn btn-G" onclick="check('G')">G</button>
            <button class="btn btn-I" onclick="check('I')">I</button>
            <button class="btn btn-N" onclick="check('N')">N</button>
        </div>
    </div>

    <div id="oops">OOPS! ❌<br>Try again!</div>

    <div id="win">
        <h2 style="font-size: 50px; color: #2ecc71;">EXCELLENT! 🌟</h2>
        <button onclick="location.reload()" style="padding: 15px 30px; font-size: 25px; cursor: pointer; border-radius: 25px; background: #2ecc71; color: white; border: none;">PLAY AGAIN</button>
    </div>

    <script>
        const gameData = [
            { name: 'CAT', letter: 'C', type: 'emoji', value: '🐱' },
            { name: 'CAR', letter: 'C', type: 'emoji', value: '🚗' },
            { name: 'CAKE', letter: 'C', type: 'emoji', value: '🎂' },
            { name: 'GRANDMA', letter: 'G', type: 'emoji', value: '👵' },
            { name: 'GUITAR', letter: 'G', type: 'emoji', value: '🎸' },
            { name: 'GRAPES', letter: 'G', type: 'emoji', value: '🍇' },
            { name: 'INSECT', letter: 'I', type: 'emoji', value: '🪲' },
            { name: 'IGUANA', letter: 'I', type: 'img', value: 'iguana.png' },
            { name: 'IGLOO', letter: 'I', type: 'img', value: 'igloo.png' },
            { name: 'NINE', letter: 'N', type: 'emoji', value: '9️⃣' },
            { name: 'NOSE', letter: 'N', type: 'emoji', value: '👃' },
            { name: 'NURSE', letter: 'N', type: 'img', value: 'nurse.png' }
        ];

        let score = 0, solved = 0, active = null, activeIdx = null;

        function init() {
            const grid = document.getElementById('gameGrid');
            [...gameData].sort(() => Math.random() - 0.5).forEach((d, i) => {
                const box = document.createElement('div');
                box.className = 'box-container';
                box.innerHTML = `<div class="box" id="box-${i}" onclick="showPane(${i})">
                    <div class="content front" style="font-size:50px; color:white;">${i+1}</div>
                    <div class="content back">
                        ${d.type === 'img' ? `<img src="${d.value}" class="img-card">` : `<span style="font-size:60px">${d.value}</span>`}
                        <div class="name-label" style="display:none;" id="label-${i}">${d.name}</div>
                    </div>
                </div>`;
                grid.appendChild(box);
            });
        }

        function showPane(idx) {
            if (active) return;
            activeIdx = idx;
            const box = document.getElementById(`box-${idx}`);
            // Buscar la data correcta
            const backContent = box.querySelector('.back').innerHTML;
            active = gameData.find(d => backContent.includes(d.value));

            box.classList.add('opened');
            setTimeout(() => {
                const target = document.getElementById('img-target');
                target.innerHTML = box.querySelector('.back').innerHTML;
                // Hacer que el nombre sea visible en el panel grande
                const labelInPane = target.querySelector('.name-label');
                if(labelInPane) labelInPane.style.display = 'block';
                target.style.fontSize = "100px";

                document.getElementById('overlay').style.display = 'block';
                document.getElementById('pane').style.display = 'block';
            }, 600);
        }

        function check(choice) {
            document.getElementById('pane').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            if (choice === active.letter) {
                confetti();
                score += 10; solved++;
                document.getElementById(`box-${activeIdx}`).classList.add('solved');
                // Mostrar nombre en el tablero después de ganar la carta
                document.getElementById(`label-${activeIdx}`).style.display = 'block';
                
                if ('speechSynthesis' in window) {
                    const msg = new SpeechSynthesisUtterance(`${active.letter} is for ${active.name}`);
                    msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
                }
                active = null;
                if(solved === 12) document.getElementById('win').style.display = 'flex';
            } else {
                document.getElementById('oops').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('oops').style.display = 'none';
                    document.getElementById(`box-${activeIdx}`).classList.remove('opened');
                    active = null;
                }, 1500);
            }
        }
        init();
    </script>
</body>
</html>
