<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Game: C, G, I, N</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            background: radial-gradient(circle, #ff9a9e 0%, #fad0c4 100%);
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header { text-align: center; margin-top: 10px; }
        h1 { font-size: 40px; color: #2e86de; text-shadow: 2px 2px 0px white; margin: 0; }
        #score-board { font-size: 24px; background: white; padding: 5px 20px; border-radius: 50px; margin-top: 5px; color: #ff4757; border: 3px solid #ff4757; }
        #gameGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px; max-width: 800px; }
        .box-container { width: 150px; height: 150px; perspective: 1000px; cursor: pointer; }
        .box {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transition: transform 0.6s; background: #feca57; border: 5px solid #fff; border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
        }
        .box.opened { transform: rotateY(180deg); background-color: #e0f7fa; }
        .box.solved { background-color: #a5d6a7; border-color: #2ecc71; }
        .content { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .front { font-size: 60px; color: white; }
        .back { transform: rotateY(180deg); }
        .image-display { width: 75%; height: 75%; object-fit: contain; }
        .image-emoji { font-size: 70px; }
        
        /* ESTILO PARA LA PALABRA QUE APARECE AL ACERTAR */
        .word-label {
            display: none; 
            font-size: 20px; color: #2e86de; font-weight: bold;
            margin-top: 5px; background: white; padding: 2px 8px; border-radius: 8px;
        }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 90; }
        .pane { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 30px; z-index: 100; text-align: center; border: 8px solid #54a0ff; }
        .btn { font-size: 40px; width: 80px; height: 80px; margin: 5px; border: none; border-radius: 50%; color: white; cursor: pointer; }
        .btn-C { background: #FF5252; } .btn-G { background: #4CAF50; } .btn-I { background: #2196F3; } .btn-N { background: #FFEB3B; color: #333; }
        #win { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
    </style>
</head>
<body>

    <header>
        <h1>WHICH LETTER?</h1>
        <div id="score-board">POINTS: <span id="points">0</span></div>
    </header>

    <div id="gameGrid"></div>

    <div class="overlay" id="overlay"></div>
    <div class="pane" id="pane">
        <div id="display-area"></div>
        <div id="btns" style="margin-top:20px"></div>
    </div>

    <div id="win">
        <h2 style="font-size: 50px; color: #2ecc71;">EXCELLENT! 🌟</h2>
        <div style="font-size: 100px;">🏆</div>
        <button onclick="location.reload()" style="padding: 15px 30px; font-size: 25px; cursor: pointer; border-radius: 20px;">PLAY AGAIN</button>
    </div>

    <script>
        const gameData = [
            { name: 'CAT', letter: 'C', type: 'emoji', value: '🐱' },
            { name: 'CAR', letter: 'C', type: 'emoji', value: '🚗' },
            { name: 'CAKE', letter: 'C', type: 'emoji', value: '🎂' },
            { name: 'GRANDMA', letter: 'G', type: 'emoji', value: '👵' },
            { name: 'GUITAR', letter: 'G', type: 'emoji', value: '🎸' },
            { name: 'GRAPES', letter: 'G', type: 'emoji', value: '🍇' },
            { name: 'INSECT', letter: 'I', type: 'emoji', value: '🪲' },
            { name: 'IGUANA', letter: 'I', type: 'img', value: 'iguana.jpg' },
            { name: 'IGLOO', letter: 'I', type: 'img', value: 'igloo.jpg' },
            { name: 'NINE', letter: 'N', type: 'emoji', value: '9️⃣' },
            { name: 'NOSE', letter: 'N', type: 'emoji', value: '👃' },
            { name: 'NURSE', letter: 'N', type: 'img', value: 'nurse.jpg' }
        ];

        let score = 0, solved = 0, active = null, activeIdx = null;

        function init() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            [...gameData].sort(() => Math.random() - 0.5).forEach((d, i) => {
                const box = document.createElement('div');
                box.className = 'box-container';
                box.innerHTML = `
                    <div class="box" id="box-${i}" onclick="showPane(${i}, '${d.name}')">
                        <div class="content front">${i+1}</div>
                        <div class="content back">
                            ${d.type === 'img' ? `<img src="${d.value}" class="image-display">` : `<div class="image-emoji">${d.value}</div>`}
                            <div class="word-label" id="word-${i}">${d.name}</div>
                        </div>
                    </div>`;
                grid.appendChild(box);
            });
        }

        function showPane(idx, name) {
            const box = document.getElementById(`box-${idx}`);
            if (box.classList.contains('opened') || active) return;
            active = gameData.find(d => d.name === name);
            activeIdx = idx;
            box.classList.add('opened');
            
            setTimeout(() => {
                document.getElementById('display-area').innerHTML = active.type === 'img' ? `<img src="${active.value}" style="width:180px">` : `<div style="font-size:120px">${active.value}</div>`;
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('pane').style.display = 'block';
                const btns = document.getElementById('btns');
                btns.innerHTML = '';
                ['C','G','I','N'].forEach(l => {
                    const b = document.createElement('button');
                    b.className = `btn btn-${l}`; b.innerText = l;
                    b.onclick = () => check(l);
                    btns.appendChild(b);
                });
            }, 600);
        }

        function check(choice) {
            document.getElementById('pane').style.display = 'none';
            if (choice === active.letter) {
                confetti(); score += 10; solved++;
                document.getElementById('points').innerText = score;
                document.getElementById(`box-${activeIdx}`).classList.add('solved');
                document.getElementById(`word-${activeIdx}`).style.display = 'block'; // MUESTRA LA PALABRA
                
                if ('speechSynthesis' in window) {
                    const msg = new SpeechSynthesisUtterance(`Correct! ${active.letter} is for ${active.name}`);
                    msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
                }
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'none';
                    active = null;
                    if(solved === 12) document.getElementById('win').style.display = 'flex';
                }, 1800);
            } else {
                alert("Try again! ❌");
                document.getElementById(`box-${activeIdx}`).classList.remove('opened');
                document.getElementById('overlay').style.display = 'none';
                active = null;
            }
        }
        init();
    </script>
</body>
</html>
